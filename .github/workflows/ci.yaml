name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0

      - name: Run Oxlint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vp exec oxlint --deny=correctness --warn=suspicious --warn=perf -f unix 2>&1 | \
            reviewdog -efm="%f:%l:%c: %m" -name="oxlint" \
              -reporter=github-pr-review \
              -filter-mode=added \
              -fail-level=any

      - name: Run tests
        run: vp test

      - name: Type check + lint + format check
        run: vp check

      - name: Build
        run: vp build
