name: PR Preview

on:
  pull_request:
    paths:
      - "src/**"
      - "plugins/**"
      - "scripts/**"
      - "public/**"
      - "index.html"
      - "wrangler.jsonc"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pr-preview.yaml"

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build
        run: vp build

      - name: Upload preview version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
          VERSION_MESSAGE: ${{ github.event.pull_request.title }}
        run: |
          OUTPUT=$(vp exec wrangler versions upload --preview-alias "$PREVIEW_ALIAS" --message "$VERSION_MESSAGE")
          echo "$OUTPUT"
          URL=$(printf '%s\n' "$OUTPUT" | grep -oE 'Version Preview Alias URL: https://[a-zA-Z0-9.-]+\.workers\.dev' | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev')
          if [ -z "$URL" ]; then
            echo "Preview Alias URL not found in wrangler output" >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- pr-preview-comment -->";
            const url = "${{ steps.upload.outputs.url }}";
            const body = `${marker}\n### 🔍 Preview deployed\n\n${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
