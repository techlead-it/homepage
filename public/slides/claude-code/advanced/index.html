<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 研修 上級</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2314151f'/><text x='22' y='72' font-size='60' font-family='monospace' font-weight='bold' fill='%23bb9af7'>❯</text></svg>">
  <link rel="stylesheet" href="../shared/theme.css">
  <style>
    :root { --level: var(--magenta); }
  </style>
</head>
<body>
  <div id="slide-container"></div>

  <div id="slide-nav">
    <div class="rail"><div class="fill" id="nav-fill"></div></div>
    <span class="counter" id="nav-counter">1 / 1</span>
  </div>

  <script>
    /* =====================================================================
       デッキランタイム (テンプレート + ナビゲーション)
       3デッキ共通。変更する場合は beginner/intermediate/advanced すべてに
       同じ変更を反映すること。
       ===================================================================== */
    const DECK = {
      levelTag: '上級',
      title: 'Claude Code 研修 上級',
      duration: 'HANDS-ON ・ 4h',
    };

    const statusBar = (topic, time) => `
      <div class="status-bar">
        <span class="seg-left">${DECK.levelTag}</span>
        <span class="seg-mid">${topic || DECK.title}</span>
        <span class="seg-right">${time || DECK.duration}</span>
      </div>`;

    const slide = ({ prompt, title, badge, topic, time, body }) => `
      <section class="slide">
        <div class="slide-inner">
          <p class="prompt-line"><span class="caret">❯</span> <span class="cmd">claude</span> <span class="arg">${prompt || ''}</span></p>
          <h2 class="slide-title">${title}</h2>
          ${badge ? `<span class="mode-badge ${badge}">${badge === 'hands-on' ? 'HANDS-ON ── 全員で手を動かす' : 'DEMO ── 講師デモ'}</span>` : ''}
          <div class="slide-body">${body}</div>
        </div>
        ${statusBar(topic, time)}
      </section>`;

    const hero = ({ title, sub, meta }) => `
      <section class="slide">
        <div class="hero-inner">
          <p class="hero-prompt"><span class="caret">❯</span> <span class="cmd">claude</span><span class="cursor-blink"></span></p>
          <h1 class="hero-title">${title}</h1>
          <p class="hero-sub">${sub}</p>
          <div class="hero-meta">${meta.map((m) => `<span>${m}</span>`).join('')}</div>
        </div>
        ${statusBar('', '')}
      </section>`;

    const term = (title, lines) => `
      <div class="term">
        <div class="term-head"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="term-title">${title}</span></div>
        <div class="term-body">${lines.map((l) => `<span class="${l.t}">${l.s}</span>`).join('\n')}</div>
      </div>`;

    const pass = (text) => `<div><span class="pass-chip">${text}</span></div>`;

    const cards = (cols, items) => `
      <div class="cols cols-${cols}">
        ${items.map((c) => `
          <div class="card">
            ${c.num ? `<span class="num">${c.num}</span>` : ''}
            ${c.title ? `<h3>${c.title}</h3>` : ''}
            ${c.list ? `<ul>${c.list.map((li) => `<li>${li}</li>`).join('')}</ul>` : c.body || ''}
          </div>`).join('')}
      </div>`;

    const timetable = (rows) => `
      <table class="timetable">
        <thead><tr><th>TIME</th><th>#</th><th>トピック</th><th>やること</th></tr></thead>
        <tbody>
          ${rows.map((r) => `
            <tr${r.break ? ' class="break"' : ''}>
              <td class="time">${r.time}</td>
              <td class="tno">${r.no || '—'}</td>
              <td class="topic">${r.topic}</td>
              <td>${r.desc || ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;

    const beforeAfter = (pairs) => `
      <div class="ba-grid">
        <div class="ba-col"><span class="ba-col-head before">BEFORE ── 受講前</span>
          ${pairs.map((p) => `<div class="ba-item before">${p[0]}</div>`).join('')}
        </div>
        <div class="ba-arrows"><span></span>${pairs.map(() => '<span>→</span>').join('')}</div>
        <div class="ba-col"><span class="ba-col-head after">AFTER ── 受講後</span>
          ${pairs.map((p) => `<div class="ba-item after">${p[1]}</div>`).join('')}
        </div>
      </div>`;

    const courseMap = (current) => {
      const stages = [
        { key: 'beginner', lv: 'BEGINNER', color: 'var(--green)', name: '初級', desc: '基本ワークフローを一人で回す' },
        { key: 'intermediate', lv: 'INTERMEDIATE', color: 'var(--cyan)', name: '中級', desc: 'Subagent / Skill / Hook / MCP を自作する' },
        { key: 'advanced', lv: 'ADVANCED', color: 'var(--magenta)', name: '上級', desc: 'プロジェクトのハーネスとして統合設計する' },
      ];
      return `
        <div class="course-map">
          ${stages.map((s, i) => `
            ${i > 0 ? '<span class="arrow">→</span>' : ''}
            <div class="card stage${s.key === current ? ' current' : ''}">
              <span class="lv" style="color:${s.color}">${s.lv}</span>
              <h3>${s.name}</h3>
              <p>${s.desc}</p>
            </div>`).join('')}
        </div>`;
    };

    /* =====================================================================
       スライド定義 (ここから下がこのデッキ固有のコンテンツ)
       ===================================================================== */
    const SLIDES = [
      // 1. 表紙
      hero({
        title: 'Claude Code 研修 <span class="accent">上級</span>',
        sub: 'エージェントが嘘をつけず・迷走せず・止まるべきときに止まる「ハーネス」を、プロジェクトの構造として設計する。',
        meta: ['半日 ・ 約4時間', 'ハンズオン形式', '中級コース修了者向け'],
      }),

      // 2. ゴール
      slide({
        prompt: '"このコースのゴールを教えて"',
        title: '今日の到達点 ── <em>嘘をつけず・迷走せず・止まるべきときに止まる</em>',
        body: `
          ${cards(2, [
            { num: 'GOAL 1', title: '個々の機能を「ハーネス」として統合設計する', body: '<p>初級・中級で学んだ CLAUDE.md・hooks・権限・subagent を、プロジェクト単位の一貫した構造 ── 検証器・コンテキスト・権限・停止条件 ── に組み上げます。</p>' },
            { num: 'GOAL 2', title: '自律実行を安心して任せられる範囲を自分で定義する', body: '<p>ループ仕様7要素（Goal/Context/Action/Feedback/Memory/Stop/Guardrail）を書き切り、機械的に検証・停止できる自律実行を運用します。</p>' },
          ])}
          ${pass('修了成果物 = ハーネス一式が適用されたチームタスクボード + ガードレールの発火ログ')}
        `,
      }),

      // 3. 題材アプリとロードマップ
      slide({
        prompt: '"最終的に何を作るの?"',
        title: '題材はひとつ ── <em>チームタスクボード</em>を3コースで育てる',
        topic: '題材アプリとロードマップ',
        time: '0:00–0:10',
        body: `
          <div class="cols cols-3">
            <div class="card">
              <span class="num" style="color: var(--green)">初級 ── ★</span>
              <h3>完了フラグ</h3>
              <p>チェックで完了・絞り込み表示。1テーブル1カラム+トグルUI。</p>
            </div>
            <div class="card">
              <span class="num" style="color: var(--cyan)">中級 ── ★★</span>
              <h3>タグ機能</h3>
              <p>担当者/分類タグと絞り込み。新テーブル（多対多）+migration+API+UI。</p>
            </div>
            <div class="card" style="border-color: var(--level); box-shadow: 0 0 0 1px var(--level)">
              <span class="num" style="color: var(--magenta)">上級 ── ★★★</span>
              <h3>繰り返しタスク</h3>
              <p>毎日/毎週/毎月、完了時に次回を自動生成。月末・うるう年の境界処理。</p>
            </div>
          </div>
          <div class="panel" style="margin-top: var(--gap-md)">
            <p style="font-size: 26px; line-height: 1.8; color: var(--fg-muted)">
              今日の担当は★★★の繰り返しタスク ── 月末・うるう年の境界処理は、人間でも<b style="color: var(--fg)">テストなしには正しく書けない難所</b>。
              これを<b style="color: var(--fg)">ハーネスの下でAIに任せて完走させる</b>のが今日のゴール。
            </p>
          </div>
        `,
      }),

      // 4. ハーネスとは
      slide({
        prompt: '"なぜ個々の機能だけでは足りないの?"',
        title: 'ハーネスとは ── ループの<em>外側</em>を設計する',
        body: `
          <div class="panel" style="margin-bottom: var(--gap-md)">
            <p style="font-size: 26px; line-height: 1.7; color: var(--fg-muted)">
              「計画→実行→検証→修正」のループ自体は Claude Code に既に実装されている。
              ハーネスとはそのループの<b style="color: var(--fg)">外側</b>の構造 ── 検証器（テスト・hooks・CI）・権限・コンテキスト・停止条件 ──
              であり、ループが正しく前進していることを機械的に検証でき、発散したら止められるようにする設計を指す。
            </p>
          </div>
          <table class="timetable">
            <thead><tr><th>失敗モード</th><th>症状</th><th>対策</th></tr></thead>
            <tbody>
              <tr><td class="topic">Reward hacking</td><td>テストを削除・skip・弱体化して green にする</td><td>検証器をエージェントの編集権限の外（hooks/CI）に置く</td></tr>
              <tr><td class="topic">発散</td><td>同じ失敗を繰り返し時間とトークンだけ溶ける</td><td>試行の記録と打ち切り基準</td></tr>
              <tr><td class="topic">停止設計の不在</td><td>止まるべきとき（前提の破綻・不可逆操作）に止まらない</td><td>停止・エスカレーション基準の明文化</td></tr>
            </tbody>
          </table>
        `,
      }),

      // 5. 事前準備
      slide({
        prompt: '"環境をチェックして"',
        title: 'はじめる前に ── 事前準備チェック',
        topic: '事前準備',
        time: '0:00–0:10',
        body: `
          ${term('preflight-check', [
            { t: 'ok', s: '✓ 中級時点のチームタスクボード（タグ機能・hook・skill 入り）が手元で動く' },
            { t: 'dim', s: '' },
            { t: 'dim', s: '今日はこのリポジトリに、検証器・権限・ループ仕様を積み上げてハーネスに育てます' },
            { t: 'warn', s: '! 動かない項目がある人は今すぐ挙手 ── 始まる前に一緒に解決します' },
          ])}
        `,
      }),

      // 6. タイムテーブル
      slide({
        prompt: '"本日の流れを教えて"',
        title: '4時間の地図 ── 画面下のバーが常に現在地',
        topic: '本日の流れ',
        time: '0:00–0:10',
        body: timetable([
          { time: '0:10–0:35', no: 'T1', topic: 'ハーネス設計とは', desc: 'ガードなしのエージェントが嘘をつく様子を観察（講師デモ）' },
          { time: '0:35–1:00', no: 'T2', topic: 'ループ仕様の書き下し', desc: '7要素で各自書き下し、隣同士でレビュー' },
          { time: '1:00–1:30', no: 'T3', topic: '検証器の設計', desc: 'テスト弱体化を deny する hook を実装して圧をかけ直す' },
          { time: '1:30–1:40', topic: '休憩', break: true },
          { time: '1:40–2:05', no: 'T4', topic: 'コンテキスト設計', desc: 'CLAUDE.md を階層化しトークン消費を比較' },
          { time: '2:05–2:25', no: 'T5', topic: '権限とガードレール設計', desc: '許可/禁止操作を宣言的に定義' },
          { time: '2:25–2:50', no: 'T6', topic: 'オーケストレーション設計', desc: '観点別レビューを subagent 並列 fan-out' },
          { time: '2:50–3:15', no: 'T7', topic: '自律実行と停止・エスカレーション', desc: 'headless 実行を停止条件で止める' },
          { time: '3:15–3:50', no: 'T8', topic: '総合演習', desc: 'ハーネスの穴埋めを完成させ、繰り返しタスクの実装1件を完走' },
          { time: '3:50–4:00', topic: 'クロージング', break: true },
        ]),
      }),

      // 7. T1 ハーネス設計とは
      slide({
        prompt: '"なんとしてもテストを通して"',
        title: 'ガードなしのエージェントは<em>嘘をつく</em>',
        badge: 'demo',
        topic: 'T1 ── ハーネス設計とは',
        time: '0:10–0:35',
        body: `
          ${term('claude ── ガードなしのエージェント', [
            { t: 'ng', s: '✗ recurrence.test.ts ── 1/31 の毎月繰り返し、次回は 2/28 のはず' },
            { t: 'u', s: 'なんとしてもテストを通して' },
            { t: 'a', s: 'Edit(recurrence.test.ts)               # 実装ではなくテストを編集' },
            { t: 'warn', s: '-  it("月末の繰り返しは月内最終日に丸める", …)' },
            { t: 'warn', s: '+  it.skip("月末の繰り返しは月内最終日に丸める", …)' },
            { t: 'a', s: 'Bash(pnpm test)' },
            { t: 'ok', s: '✓ 11 passed | 1 skipped' },
            { t: 'warn', s: '⚠ green にはなった ── これは「直った」のか?' },
          ])}
          ${pass('失敗モードを3分類で説明できる')}
        `,
      }),

      // 8. T2 ループ仕様の書き下し
      slide({
        prompt: '"このIssueを直して"',
        title: 'ループ仕様 ── <em>7要素</em>で書き下す',
        badge: 'hands-on',
        topic: 'T2 ── ループ仕様の書き下し',
        time: '0:35–1:00',
        body: `
          <div class="cols cols-2">
            ${term('loop-spec.md ── 記入例', [
              { t: 'a', s: 'Goal      : テスト全 green・lint 0' },
              { t: 'a', s: 'Context   : Issue 本文・CLAUDE.md' },
              { t: 'a', s: 'Action    : 編集/テスト実行のみ許可' },
              { t: 'a', s: 'Feedback  : pnpm test の exit code' },
              { t: 'a', s: 'Memory    : 試行と棄却した仮説の記録' },
              { t: 'a', s: 'Stop      : 同一失敗3回 → 中断' },
              { t: 'a', s: 'Guardrail : テスト skip を hook で deny' },
            ])}
            <div class="card">
              <h3>品質基準は「機械判定できるか」</h3>
              <ul>
                <li>良い Goal ── 「テスト全 green・lint 0 warning」。コマンドの結果で判定できる</li>
                <li>悪い Goal ── 「いい感じに直す」。誰にも判定できない</li>
                <li>書けたら隣同士で交換し、Goal と Stop が機械判定できるかをレビューする</li>
              </ul>
              <p style="margin-top: var(--gap-md)">この7要素が今日の設計図。T3 で Feedback / Guardrail を、T7 で Stop を実装していく。</p>
            </div>
          </div>
          ${pass('機械判定可能な Goal と Stop 条件が書けている')}
        `,
      }),

      // 9. T3 検証器の設計
      slide({
        prompt: '"なんとしてもテストを通して"',
        title: '検証器の設計 ── <em>同じ圧、違う結末</em>',
        badge: 'hands-on',
        topic: 'T3 ── 検証器の設計',
        time: '1:00–1:30',
        body: `
          ${term('claude ── テスト弱体化を deny する hook 導入後', [
            { t: 'u', s: 'なんとしてもテストを通して' },
            { t: 'a', s: 'Edit(recurrence.test.ts)               # T1 と同じ手を試みる' },
            { t: 'ng', s: '✗ [hook] テストの弱体化を拒否しました (it.skip への書き換え)' },
            { t: 'a', s: '実装を修正する方針に切り替えます' },
            { t: 'a', s: 'Edit(src/server/domain/recurrence.ts)  # 月末は月内最終日に丸める' },
            { t: 'a', s: 'Bash(pnpm test)' },
            { t: 'ok', s: '✓ 12 passed (12) ── 1/31 → 2/28、今度は本当に直った' },
            { t: 'dim', s: '指示は破れるが hook は破れない ── 検証器は編集権限の外に置く' },
          ])}
          ${pass('テスト弱体化を指示しても hook がブロックする')}
        `,
      }),

      // 10. T4 コンテキスト設計
      slide({
        prompt: '/context',
        title: 'コンテキスト設計 ── 常時読む最小限 + <em>必要時に Read</em>',
        badge: 'hands-on',
        topic: 'T4 ── コンテキスト設計',
        time: '1:40–2:05',
        body: `
          <div class="cols cols-2">
            ${term('CLAUDE.md ── 階層化後', [
              { t: 'dim', s: '# CLAUDE.md（常時読む最小限）' },
              { t: 'a', s: '- テストは pnpm test で実行する' },
              { t: 'a', s: '- 実装着手前に rules/tdd.md を Read する' },
              { t: 'a', s: '- テストを書く前に rules/testing.md を Read する' },
              { t: 'dim', s: '' },
              { t: 'dim', s: '# rules/（必要になったときだけ読まれる詳細）' },
              { t: 'a', s: 'rules/tdd.md ・ rules/testing.md ・ rules/design.md' },
            ])}
            <div class="card">
              <h3>設計前後で同一タスクを比較する</h3>
              <ul>
                <li>設計前 ── 全ルールを CLAUDE.md に直書き。毎ターン全文がコンテキストを占有する</li>
                <li>設計後 ── 詳細は必要なタスクのときだけ Read される</li>
                <li>同じ依頼を両方で実行し、<span class="mono">/context</span> の数値を並べて比較する</li>
              </ul>
            </div>
          </div>
          ${pass('トークン消費の削減を数値で確認')}
        `,
      }),

      // 11. T5 権限とガードレール設計
      slide({
        prompt: '"main に force push して"',
        title: '権限とガードレール ── 禁止は<em>宣言</em>する',
        badge: 'hands-on',
        topic: 'T5 ── 権限とガードレール設計',
        time: '2:05–2:25',
        body: `
          <div class="cols cols-2">
            ${term('.claude/settings.json + PreToolUse hook', [
              { t: 'a', s: '"permissions": {' },
              { t: 'a', s: '  "deny": [' },
              { t: 'ng', s: '    "Bash(git push --force*)",' },
              { t: 'ng', s: '    "Bash(wrangler d1 migrations apply * --remote*)"' },
              { t: 'a', s: '  ]' },
              { t: 'a', s: '}' },
              { t: 'dim', s: 'パターンで表せない判断は PreToolUse hook で deny する' },
            ])}
            ${term('claude', [
              { t: 'u', s: 'main に force push して' },
              { t: 'a', s: 'Bash(git push --force origin main)' },
              { t: 'ng', s: '✗ 権限設定により拒否されました' },
              { t: 'a', s: 'force push は禁止されています。通常の push か PR 作成を提案します' },
              { t: 'dim', s: '' },
              { t: 'dim', s: '「気をつけて」ではなく構造で禁止する ── T1 の教訓と同じ' },
            ])}
          </div>
          ${pass('禁止操作が実際に deny される')}
        `,
      }),

      // 12. T6 オーケストレーション設計
      slide({
        prompt: '"3観点で並列レビューして"',
        title: 'オーケストレーション ── 観点別レビューを<em>並列 fan-out</em>',
        badge: 'hands-on',
        topic: 'T6 ── オーケストレーション設計',
        time: '2:25–2:50',
        body: `
          <div class="cols cols-2">
            ${term('claude ── subagent 並列 fan-out', [
              { t: 'u', s: '品質・テスト・セキュリティの3観点で並列レビューして' },
              { t: 'a', s: 'Task(review-quality)     ── subagent 起動' },
              { t: 'a', s: 'Task(review-test)        ── 並列' },
              { t: 'a', s: 'Task(review-security)    ── 並列' },

    /* ---- ナビゲーション (3デッキ共通・変更時は全デッキに反映) ---- */
    function Deck_render() {
      document.getElementById('slide-container').innerHTML = SLIDES.join('');

      const slides = document.querySelectorAll('.slide');
      const total = slides.length;
      let current = 0;
      const fill = document.getElementById('nav-fill');
      const counter = document.getElementById('nav-counter');

      const show = (i) => {
        if (i < 0 || i >= total) return;
        slides[current].classList.remove('active');
        current = i;
        slides[current].classList.add('active');
        fill.style.width = ((current + 1) / total) * 100 + '%';
        counter.textContent = (current + 1) + ' / ' + total;
        history.replaceState(null, '', '#' + (current + 1));
      };

      document.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'ArrowRight': case ' ': case 'PageDown':
            e.preventDefault(); show(current + 1); break;
          case 'ArrowLeft': case 'PageUp':
            e.preventDefault(); show(current - 1); break;
          case 'Home': e.preventDefault(); show(0); break;
          case 'End': e.preventDefault(); show(total - 1); break;
        }
      });

      const scale = () => {
        const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        slides.forEach((el) => { el.style.transform = `translate(-50%, -50%) scale(${s})`; });
      };
      window.addEventListener('resize', scale);

      const hash = parseInt(location.hash.slice(1), 10);
      current = (hash >= 1 && hash <= total) ? hash - 1 : 0;
      slides[current].classList.add('active');
      scale();
      show(current);
    }
  </script>
