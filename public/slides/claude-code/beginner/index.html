<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 研修 初級</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2314151f'/><text x='22' y='72' font-size='60' font-family='monospace' font-weight='bold' fill='%239ece6a'>❯</text></svg>">
  <link rel="stylesheet" href="../shared/theme.css">
  <style>
    :root { --level: var(--green); }
  </style>
</head>
<body>
  <div id="slide-container"></div>

  <div id="slide-nav">
    <div class="rail"><div class="fill" id="nav-fill"></div></div>
    <span class="counter" id="nav-counter">1 / 1</span>
  </div>

  <script>
    /* =====================================================================
       デッキランタイム (テンプレート + ナビゲーション)
       3デッキ共通。変更する場合は beginner/intermediate/advanced すべてに
       同じ変更を反映すること。
       ===================================================================== */
    const DECK = {
      levelTag: '初級',
      title: 'Claude Code 研修 初級',
      duration: 'HANDS-ON ・ 4h',
    };

    const statusBar = (topic, time) => `
      <div class="status-bar">
        <span class="seg-left">${DECK.levelTag}</span>
        <span class="seg-mid">${topic || DECK.title}</span>
        <span class="seg-right">${time || DECK.duration}</span>
      </div>`;

    const slide = ({ prompt, title, badge, topic, time, body }) => `
      <section class="slide">
        <div class="slide-inner">
          <p class="prompt-line"><span class="caret">❯</span> <span class="cmd">claude</span> <span class="arg">${prompt || ''}</span></p>
          <h2 class="slide-title">${title}</h2>
          ${badge ? `<span class="mode-badge ${badge}">${badge === 'hands-on' ? 'HANDS-ON ── 全員で手を動かす' : 'DEMO ── 講師デモ'}</span>` : ''}
          <div class="slide-body">${body}</div>
        </div>
        ${statusBar(topic, time)}
      </section>`;

    const hero = ({ title, sub, meta }) => `
      <section class="slide">
        <div class="hero-inner">
          <p class="hero-prompt"><span class="caret">❯</span> <span class="cmd">claude</span><span class="cursor-blink"></span></p>
          <h1 class="hero-title">${title}</h1>
          <p class="hero-sub">${sub}</p>
          <div class="hero-meta">${meta.map((m) => `<span>${m}</span>`).join('')}</div>
        </div>
        ${statusBar('', '')}
      </section>`;

    const term = (title, lines) => `
      <div class="term">
        <div class="term-head"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="term-title">${title}</span></div>
        <div class="term-body">${lines.map((l) => `<span class="${l.t}">${l.s}</span>`).join('\n')}</div>
      </div>`;

    const pass = (text) => `<div><span class="pass-chip">${text}</span></div>`;

    const cards = (cols, items) => `
      <div class="cols cols-${cols}">
        ${items.map((c) => `
          <div class="card">
            ${c.num ? `<span class="num">${c.num}</span>` : ''}
            ${c.title ? `<h3>${c.title}</h3>` : ''}
            ${c.list ? `<ul>${c.list.map((li) => `<li>${li}</li>`).join('')}</ul>` : c.body || ''}
          </div>`).join('')}
      </div>`;

    const timetable = (rows) => `
      <table class="timetable">
        <thead><tr><th>TIME</th><th>#</th><th>トピック</th><th>やること</th></tr></thead>
        <tbody>
          ${rows.map((r) => `
            <tr${r.break ? ' class="break"' : ''}>
              <td class="time">${r.time}</td>
              <td class="tno">${r.no || '—'}</td>
              <td class="topic">${r.topic}</td>
              <td>${r.desc || ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;

    const beforeAfter = (pairs) => `
      <div class="ba-grid">
        <div class="ba-col"><span class="ba-col-head before">BEFORE ── 受講前</span>
          ${pairs.map((p) => `<div class="ba-item before">${p[0]}</div>`).join('')}
        </div>
        <div class="ba-arrows"><span></span>${pairs.map(() => '<span>→</span>').join('')}</div>
        <div class="ba-col"><span class="ba-col-head after">AFTER ── 受講後</span>
          ${pairs.map((p) => `<div class="ba-item after">${p[1]}</div>`).join('')}
        </div>
      </div>`;

    const courseMap = (current) => {
      const stages = [
        { key: 'beginner', lv: 'BEGINNER', color: 'var(--green)', name: '初級', desc: '基本ワークフローを一人で回す' },
        { key: 'intermediate', lv: 'INTERMEDIATE', color: 'var(--cyan)', name: '中級', desc: 'Subagent / Skill / Hook / MCP を自作する' },
        { key: 'advanced', lv: 'ADVANCED', color: 'var(--magenta)', name: '上級', desc: 'プロジェクトのハーネスとして統合設計する' },
      ];
      return `
        <div class="course-map">
          ${stages.map((s, i) => `
            ${i > 0 ? '<span class="arrow">→</span>' : ''}
            <div class="card stage${s.key === current ? ' current' : ''}">
              <span class="lv" style="color:${s.color}">${s.lv}</span>
              <h3>${s.name}</h3>
              <p>${s.desc}</p>
            </div>`).join('')}
        </div>`;
    };

    /* =====================================================================
       スライド定義 (ここから下がこのデッキ固有のコンテンツ)
       ===================================================================== */
    const SLIDES = [
      // 1. 表紙
      hero({
        title: 'Claude Code 研修 <span class="accent">初級</span>',
        sub: 'AIコーディングエージェントの基本ワークフローを、半日で「一人で回せる」ように。',
        meta: ['半日 ・ 約4時間', 'ハンズオン形式', 'AIコーディング未経験者向け'],
      }),

      // 2. ゴール
      slide({
        prompt: '"このコースのゴールを教えて"',
        title: '今日の到達点 ── <em>一人で回せる</em> + <em>本番URLで動く</em>',
        body: `
          ${cards(2, [
            { num: 'GOAL 1', title: 'Explore → Plan → Code → Commit を一人で完走', body: '<p>バグ修正・小機能追加を Claude Code に任せ、自分は「計画の承認」と「結果の検証」に集中する開発スタイルを体得します。</p>' },
            { num: 'GOAL 2', title: 'AIに頼んで本番デプロイ', body: '<p>「Cloudflareにデプロイして」の一言で、DB作成からデプロイまでの複数ステップをエージェントに完走させます。</p>' },
          ])}
          ${pass('修了成果物 = 本番URLで動くチームタスクボード + 自分のコミット履歴')}
        `,
      }),

      // 3. 題材アプリとロードマップ
      slide({
        prompt: '"最終的に何を作るの?"',
        title: '題材はひとつ ── <em>チームタスクボード</em>を3コースで育てる',
        topic: '題材アプリとロードマップ',
        time: '0:00–0:10',
        body: `
          <div class="cols cols-3">
            <div class="card" style="border-color: var(--level); box-shadow: 0 0 0 1px var(--level)">
              <span class="num" style="color: var(--green)">初級 ── ★</span>
              <h3>完了フラグ</h3>
              <p>チェックで完了・絞り込み表示。1テーブル1カラム+トグルUI。</p>
            </div>
            <div class="card">
              <span class="num" style="color: var(--cyan)">中級 ── ★★</span>
              <h3>タグ機能</h3>
              <p>担当者/分類タグと絞り込み。新テーブル（多対多）+migration+API+UI。</p>
            </div>
            <div class="card">
              <span class="num" style="color: var(--magenta)">上級 ── ★★★</span>
              <h3>繰り返しタスク</h3>
              <p>毎日/毎週/毎月、完了時に次回を自動生成。月末・うるう年の境界処理。</p>
            </div>
          </div>
          <div class="panel" style="margin-top: var(--gap-md)">
            <p style="font-size: 26px; line-height: 1.8; color: var(--fg-muted)">
              修了時に残るのは、自分のCloudflareで動く<b style="color: var(--fg)">チームタスクボード</b>と、
              それを安全に育て続けられる<b style="color: var(--fg)">ハーネス付きリポジトリ</b>。
              コースが進むほど機能は複雑になる ── 複雑なほど「ハーネスが効いている」感覚が強くなる。
            </p>
          </div>
        `,
      }),

      // 4. 事前準備
      slide({
        prompt: '"環境をチェックして"',
        title: 'はじめる前に ── 事前準備チェック',
        topic: '事前準備',
        time: '0:00–0:10',
        body: `
          ${term('preflight-check', [
            { t: 'ok', s: '✓ Claude Pro/Max アカウント（または会社支給アカウント）' },
            { t: 'ok', s: '✓ Cloudflare アカウント（無料枠でOK）' },
            { t: 'ok', s: '✓ GitHub アカウント' },
            { t: 'ok', s: '✓ Node.js / pnpm / git / VS Code' },
            { t: 'ok', s: '✓ wrangler login 済み' },
            { t: 'dim', s: '' },
            { t: 'warn', s: '! 未完了の項目がある人は今すぐ挙手 ── 始まる前に一緒に解決します' },
          ])}
        `,
      }),

      // 5. タイムテーブル
      slide({
        prompt: '"本日の流れを教えて"',
        title: '4時間の地図 ── 画面下のバーが常に現在地',
        topic: '本日の流れ',
        time: '0:00–0:10',
        body: timetable([
          { time: '0:10–0:30', no: 'T1', topic: 'AIコーディングエージェントとは', desc: 'チャットAIとの違いを見る（講師デモ）' },
          { time: '0:30–0:45', no: 'T2', topic: 'エージェントループの仕組み', desc: 'ツール呼び出しログを読む（講師デモ）' },
          { time: '0:45–1:05', no: 'T3', topic: 'インストールと初回起動', desc: '各自インストール → 最初のプロンプト' },
          { time: '1:05–1:50', no: 'T4', topic: 'Explore → Plan → Code → Commit', desc: '仕込まれたバグをテストgreenまで直す' },
          { time: '1:50–2:00', topic: '休憩', break: true },
          { time: '2:00–2:15', no: 'T5', topic: 'コンテキスト管理', desc: '/context と /compact を体感する' },
          { time: '2:15–2:35', no: 'T6', topic: 'CLAUDE.md', desc: 'プロジェクトの記憶を書いて検証する' },
          { time: '2:35–2:50', no: 'T7', topic: 'Subagents / Skills / MCP / Hooks 概観', desc: '中級への予告編（講師デモ）' },
          { time: '2:50–3:50', no: 'T8', topic: '総合ハンズオン', desc: '機能追加 → 本番デプロイまで完走' },
          { time: '3:50–4:00', topic: 'クロージング', break: true },
        ]),
      }),

      // 6. T1 エージェントとは
      slide({
        prompt: '"このバグを直して"',
        title: 'チャットAIと<em>エージェント</em>は何が違う?',
        badge: 'demo',
        topic: 'T1 ── AIコーディングエージェントとは',
        time: '0:10–0:30',
        body: `
          ${cards(2, [
            { num: 'CHAT', title: 'チャットAI', list: [
              '貼られたコードしか見えない',
              '「こう直すといいですよ」と提案を返す',
              '実行するのはあなた',
              '動くかどうか検証するのもあなた',
            ] },
            { num: 'AGENT', title: 'Claude Code', list: [
              'リポジトリを自分で探索する',
              'ファイルを直接編集する',
              'テストを自分で実行する',
              '結果を見て自分で直す',
            ] },
          ])}
          ${pass('チャットとエージェントの違いを1文で言える')}
        `,
      }),

      // 7. T2 エージェントループ
      slide({
        prompt: '"落ちているテストの原因を直して"',
        title: 'エージェントループ ── <em>収集 → 行動 → 検証</em>',
        badge: 'demo',
        topic: 'T2 ── エージェントループの仕組み',
        time: '0:30–0:45',
        body: `
          ${term('claude ── ツール呼び出しログ', [
            { t: 'u', s: '落ちているテストの原因を直して' },
            { t: 'a', s: 'Bash(pnpm test)                        # 検証 ── まず現状を見る' },
            { t: 'ng', s: '✗ 1 failed ── tasks.test.ts' },
            { t: 'a', s: 'Read(src/server/routes/tasks.ts)       # 収集 ── コードを読む' },
            { t: 'a', s: 'Edit(src/server/routes/tasks.ts)       # 行動 ── 直す' },
            { t: 'a', s: 'Bash(pnpm test)                        # 検証 ── もう一度確かめる' },
            { t: 'ok', s: '✓ 12 passed (12)' },
            { t: 'dim', s: 'ループは「検証が通るまで」回る ── だからテストがあるほどAIは強くなる' },
          ])}
          ${pass('ログの中の「収集・行動・検証」を指し示せる')}
        `,
      }),

      // 8. T3 インストールと初回起動
      slide({
        prompt: '"このプロジェクトの構成を説明して"',
        title: 'インストールして、最初の一言',
        badge: 'hands-on',
        topic: 'T3 ── インストールと初回起動',
        time: '0:45–1:05',
        body: `
          ${term('terminal', [
            { t: 'u', s: 'npm install -g @anthropic-ai/claude-code' },
            { t: 'u', s: 'git clone <題材リポジトリのURL> && cd <リポジトリ名>' },
            { t: 'u', s: 'claude' },
            { t: 'a', s: 'Welcome to Claude Code!' },
            { t: 'u', s: 'このプロジェクトの構成を説明して' },
            { t: 'a', s: 'React 19 + Hono + Cloudflare D1 のチームタスクボードです。src/front が SPA、…' },
          ])}
          ${pass('プロジェクト概要の説明が返ってくる')}
        `,
      }),

      // 9. T4 基本ワークフロー
      slide({
        prompt: '"テストをgreenにして"',
        title: '基本ワークフロー ── <em>Explore → Plan → Code → Commit</em>',
        badge: 'hands-on',
        topic: 'T4 ── 基本ワークフロー',
        time: '1:05–1:50',
        body: `
          ${cards(2, [
            { num: '1. EXPLORE', title: '探索させる', body: '<p>「なぜこのテストが落ちているか調べて」。まず原因をAIに探索させ、思い込みで直させない。</p>' },
            { num: '2. PLAN', title: 'Plan Mode で計画を承認', body: '<p>Shift+Tab で Plan Mode に切り替え。修正方針を先に出させ、納得してから実行に移す。</p>' },
            { num: '3. CODE', title: '実装と検証はエージェント', body: '<p>編集もテスト実行もAIの仕事。あなたはdiffとテスト結果を見る。</p>' },
            { num: '4. COMMIT', title: 'diffを確認してコミット', body: '<p>「コミットして」で完了。何をコミットしたか自分の言葉で説明できること。</p>' },
          ])}
          ${pass('テスト green + コミット1つ')}
        `,
      }),

      // 10. T5 コンテキスト管理
      slide({
        prompt: '/context',
        title: 'コンテキストは<em>有限</em> ── 長い会話は劣化する',
        badge: 'hands-on',
        topic: 'T5 ── コンテキスト管理',
        time: '2:00–2:15',
        body: `
          <div class="cols cols-2">
            ${term('claude', [
              { t: 'u', s: '/context' },
              { t: 'warn', s: '▮▮▮▮▮▮▮▯▯▯ 68% used' },
              { t: 'u', s: '/compact' },
              { t: 'a', s: 'ここまでの会話を要約して圧縮しました' },
              { t: 'u', s: '/context' },
              { t: 'ok', s: '▮▮▮▯▯▯▯▯▯▯ 31% used' },
            ])}
            <div class="card">
              <h3>使い分けの目安</h3>
              <ul>
                <li><span class="mono">/context</span> ── 今どれだけ使っているか見る</li>
                <li><span class="mono">/compact</span> ── 大きな作業の前に圧縮する</li>
                <li><span class="mono">/clear</span> ── 別のタスクに移るときはゼロから</li>
              </ul>
              <p style="margin-top: var(--gap-md)">古い指示ほど薄まる。「覚えているはず」を疑うのが上達の第一歩。</p>
            </div>
          </div>
          ${pass('使用量の増減を自分の目で確認した')}
        `,
      }),

      // 11. T6 CLAUDE.md
      slide({
        prompt: '"コミットして"',
        title: 'CLAUDE.md ── プロジェクトの<em>記憶</em>を書く',
        badge: 'hands-on',
        topic: 'T6 ── CLAUDE.md',
        time: '2:15–2:35',
        body: `
          <div class="cols cols-2">
            ${term('CLAUDE.md', [
              { t: 'dim', s: '# CLAUDE.md' },
              { t: 'a', s: '- コミットメッセージは日本語で書く' },
              { t: 'a', s: '- テストは pnpm test で実行する' },
              { t: 'a', s: '- UIの文言は「です・ます」調にする' },
            ])}
            <div class="card">
              <h3>毎回説明していた約束事を、一度だけ書く</h3>
              <ul>
                <li>セッションを跨いで効く ── 明日も同じ約束を守る</li>
                <li>リポジトリにコミットすれば<b>チーム全員</b>のClaude Codeが従う</li>
                <li>書いたら検証 ── 同じ依頼を出して出力が変わるか確かめる</li>
              </ul>
            </div>
          </div>
          ${pass('指示を書く前と後で、コミットメッセージの言語が変わった')}
        `,
      }),

      // 12. T7 概観
      slide({
        prompt: '--help',
        title: 'この先の世界 ── 中級への予告編',
        badge: 'demo',
        topic: 'T7 ── Subagents / Skills / MCP / Hooks 概観',
        time: '2:35–2:50',
        body: `
          ${cards(2, [
            { num: 'SUBAGENTS', title: '調査を隔離して委任', body: '<p>大きな調査を別コンテキストのエージェントに任せ、メインの会話を汚さない。</p>' },
            { num: 'SKILLS', title: '定型手順を指示書に', body: '<p>チームの手順を再利用可能なスキルとして配布し、誰がやっても同じ品質に。</p>' },
            { num: 'MCP', title: '外部ツールをAIの手に', body: '<p>ブラウザや外部ドキュメントをAI自身が操作して、検証まで任せられる。</p>' },
            { num: 'HOOKS', title: '危険な操作を機械的にブロック', body: '<p>「気をつけて」ではなくコードで禁止する。守らせたいことはルールではなく構造に。</p>' },
          ])}
          ${pass('4つの機能をそれぞれ1文で説明できる')}
        `,
      }),

      // 13. T8 総合ハンズオン
      slide({
        prompt: '"Cloudflareにデプロイして"',
        title: '総合ハンズオン ── 機能追加から<em>本番デプロイ</em>まで',
        badge: 'hands-on',
        topic: 'T8 ── 総合ハンズオン',
        time: '2:50–3:50',
        body: `
          <div class="cols cols-2">
            <div class="card">
              <h3>やること</h3>
              <ul>
                <li><b>STEP 1</b> ── 完了フラグ（チェックで完了・絞り込み表示）を T4 のワークフローで完走</li>
                <li><b>STEP 2</b> ── 「Cloudflareにデプロイして」と依頼する</li>
                <li><b>STEP 3</b> ── 発行された workers.dev のURLをスマホで開いて動作確認</li>
              </ul>
              <p style="margin-top: var(--gap-md)">早く終わった人には追加課題があります（難易度別に2〜3件）。</p>
            </div>
            ${term('claude ── デプロイの中でエージェントがやっていること', [
              { t: 'u', s: 'Cloudflareにデプロイして' },
              { t: 'a', s: 'Bash(wrangler d1 create taskboard-db) # DBを作成' },
              { t: 'a', s: 'Edit(wrangler.jsonc)                  # database_id を反映' },
              { t: 'a', s: 'Bash(wrangler d1 migrations apply …)  # スキーマを適用' },
              { t: 'a', s: 'Bash(wrangler deploy)                 # デプロイ' },
              { t: 'ok', s: '✨ https://taskboard.<あなた>.workers.dev' },
            ])}
          </div>
          ${pass('本番URLでアプリが動く')}
        `,
      }),

      // 14. Before / After
      slide({
        prompt: '"受講前後を比較して"',
        title: '身につけると<em>どうなれるか</em>',
        topic: 'クロージング',
        time: '3:50–4:00',
        body: beforeAfter([
          ['AIコーディングは「チャットにコードを貼って聞く」もの', 'エージェントがファイルを読み・編集し・テストする開発スタイルで働ける'],
          ['バグ修正・小機能追加は全部自分の手を動かす', '日常タスクをAIに任せ、計画の承認と結果の検証に集中できる'],
          ['デプロイは手順書を見ながら1ステップずつ', '「デプロイして」の一言で複数ステップを完走させられる'],
          ['AIの出力が正しいか判断できず不安', 'テストとdiffで機械的に検証する習慣がある'],
          ['プロジェクトの約束事を毎回説明', 'CLAUDE.mdに書いて一度で済ませられる'],
        ]),
      }),

      // 15. クロージング
      slide({
        prompt: '"次は?"',
        title: 'ここから先は「仕組みを<em>作る</em>」側へ',
        topic: 'クロージング',
        time: '3:50–4:00',
        body: `
          ${courseMap('beginner')}
          <div class="panel" style="margin-top: var(--gap-lg)">
            <p style="font-size: 26px; line-height: 1.8; color: var(--fg-muted)">
              中級では今日デモで見た <b style="color: var(--fg)">Subagents / Skills / MCP / Hooks</b> を自分の手で作ります。
              題材は今日デプロイしたチームタスクボードの続き（★★のタグ機能）── 忘れないうちにまた触っておいてください。
            </p>
          </div>
        `,
      }),
    ];

    Deck_render();

    /* ---- ナビゲーション (3デッキ共通・変更時は全デッキに反映) ---- */
    function Deck_render() {
      document.getElementById('slide-container').innerHTML = SLIDES.join('');

      const slides = document.querySelectorAll('.slide');
      const total = slides.length;
      let current = 0;
      const fill = document.getElementById('nav-fill');
      const counter = document.getElementById('nav-counter');

      const show = (i) => {
        if (i < 0 || i >= total) return;
        slides[current].classList.remove('active');
        current = i;
        slides[current].classList.add('active');
        fill.style.width = ((current + 1) / total) * 100 + '%';
        counter.textContent = (current + 1) + ' / ' + total;
        history.replaceState(null, '', '#' + (current + 1));
      };

      document.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'ArrowRight': case ' ': case 'PageDown':
            e.preventDefault(); show(current + 1); break;
          case 'ArrowLeft': case 'PageUp':
            e.preventDefault(); show(current - 1); break;
          case 'Home': e.preventDefault(); show(0); break;
          case 'End': e.preventDefault(); show(total - 1); break;
        }
      });

      /* タッチ操作: タップ=右側2/3で次へ・左側1/3で前へ / スワイプ=左で次へ・右で前へ */
      const container = document.getElementById('slide-container');
      let touchStartX = 0, touchStartY = 0;
      container.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
      }, { passive: true });
      container.addEventListener('touchend', (e) => {
        if (e.target.closest('a')) return;
        if (String(window.getSelection())) return;
        const endX = e.changedTouches[0].clientX;
        const dx = endX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
          show(dx < 0 ? current + 1 : current - 1);
        } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
          show(endX < window.innerWidth / 3 ? current - 1 : current + 1);
        }
      }, { passive: true });

      const scale = () => {
        const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        slides.forEach((el) => { el.style.transform = `translate(-50%, -50%) scale(${s})`; });
      };
      window.addEventListener('resize', scale);

      const hash = parseInt(location.hash.slice(1), 10);
      current = (hash >= 1 && hash <= total) ? hash - 1 : 0;
      slides[current].classList.add('active');
      scale();
      show(current);
    }
  </script>
</body>
</html>
